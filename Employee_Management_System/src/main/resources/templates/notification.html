<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .header-card{
            background:linear-gradient(135deg,#0d6efd,#0dcaf0);
            color:white;
            border-radius:15px;
            padding:20px;
            margin-bottom:20px;
        }

        .notification-card{
            border:none;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
            margin-bottom:15px;
            transition:0.3s;
        }

        .notification-card:hover{
            transform:translateY(-3px);
        }

        .unread{
            border-left:5px solid #dc3545;
        }

        .read{
            border-left:5px solid #198754;
        }

        .notification-time{
            font-size:13px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="header-card">
        <h2>
            <i class="fas fa-bell"></i>
            Notifications
        </h2>
        <p class="mb-0">
            View all system notifications and announcements.
        </p>
    </div>

    <div th:if="${#lists.isEmpty(notifications)}">
        <div class="alert alert-warning">
            No notifications available.
        </div>
    </div>

    <div th:each="notification : ${notifications}">

        <div class="card notification-card"
             th:classappend="${notification.readStatus} ? 'read' : 'unread'">

            <div class="card-body">

                <div class="d-flex justify-content-between">

                    <h5 th:text="${notification.title}">
                        Notification Title
                    </h5>

                    <span class="badge bg-danger"
                          th:if="${!notification.readStatus}">
                        New
                    </span>

                </div>

                <p class="mt-2"
                   th:text="${notification.message}">
                    Notification Message
                </p>

                <div class="notification-time">
                    <i class="fas fa-clock"></i>
                    <span th:text="${notification.createdAt}">
                        Date Time
                    </span>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
