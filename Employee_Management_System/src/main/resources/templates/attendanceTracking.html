<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Attendance Tracking</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold text-primary">
                <i class="fas fa-clock me-2"></i>
                Attendance Tracking
            </h2>
            <p class="text-muted mb-0">
                Employee Daily Attendance Report
            </p>
        </div>

        <div>
            <a th:href="@{/employee/dashboard}"
               class="btn btn-primary">
                <i class="fas fa-arrow-left"></i>
                Dashboard
            </a>

            <a th:href="@{/employee/logout}"
               class="btn btn-danger">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </a>
        </div>

    </div>

    <!-- Attendance Card -->
    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">
                <i class="fas fa-user-check me-2"></i>
                Today's Attendance Details
            </h4>
        </div>

        <div class="card-body">

            <div th:if="${attendance != null}">

                <table class="table table-hover table-bordered align-middle">

                    <tbody>

                    <tr>
                        <th width="30%">Employee ID</th>
                        <td th:text="${attendance.employeeId}"></td>
                    </tr>

                    <tr>
                        <th>Employee Name</th>
                        <td th:text="${attendance.employeeName}"></td>
                    </tr>

                    <tr>
                        <th>Date</th>
                        <td th:text="${attendance.date}"></td>
                    </tr>

                    <tr>
                        <th>Login Time</th>
                        <td th:text="${attendance.loginTime}"></td>
                    </tr>

                    <tr>
                        <th>Logout Time</th>
                        <td th:text="${attendance.logoutTime != null ? attendance.logoutTime : 'Still Working'}"></td>
                    </tr>

                    <tr>
                        <th>Working Hours</th>
                        <td th:text="${attendance.workingHours != null ? attendance.workingHours + ' Hours' : 'Calculating...'}"></td>
                    </tr>

                    <tr>
                        <th>Status</th>
                        <td>
                            <span class="badge bg-success"
                                  th:text="${attendance.status}">
                            </span>
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

            <!-- No Attendance Found -->
            <div th:if="${attendance == null}"
                 class="text-center py-5">

                <i class="fas fa-calendar-times fa-4x text-secondary mb-3"></i>

                <h4>No Attendance Record Found</h4>

                <p class="text-muted">
                    No attendance has been recorded for today.
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
