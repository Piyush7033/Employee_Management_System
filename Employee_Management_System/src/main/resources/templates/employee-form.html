<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            color: white;
            padding: 30px;
        }

        label {
            font-weight: 600;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: none;
            padding: 10px;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: none;
        }

        .btn {
            border-radius: 50px;
            font-weight: 600;
            padding: 10px 20px;
        }

        .btn-success {
            background: #00c853;
            border: none;
        }

        .btn-success:hover {
            background: #00b34a;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .form-section {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card-box">

                <!-- HEADER -->
                <div class="header">
                    <div class="icon">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <h3>Add / Update Employee</h3>
                    <p>Employee Management Form</p>
                </div>

                <!-- FORM -->
                <form th:action="@{/employees/save}"
                      th:object="${employee}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden" th:field="*{id}">

                    <!-- NAME -->
                    <div class="form-section">
                        <label>Name</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control"
                               placeholder="Enter name"
                               required>
                    </div>

                    <!-- EMAIL -->
                    <div class="form-section">
                        <label>Email</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               placeholder="Enter email"
                               required>
                    </div>

                    <!-- PHONE -->
                    <div class="form-section">
                        <label>Phone</label>
                        <input type="text"
                               th:field="*{phone}"
                               class="form-control"
                               placeholder="Enter phone">
                    </div>

                    <!-- JOINING DATE -->
                    <div class="form-section">
                        <label>Joining Date</label>
                        <input type="date"
                               th:field="*{joiningDate}"
                               class="form-control">
                    </div>

                    <!-- IMAGE -->
                    <div class="form-section">
                        <label>Employee Image</label>
                        <input type="file"
                               name="imageFile"
                               class="form-control">
                    </div>

                    <!-- DEPARTMENT -->
                    <div class="form-section">
                        <label>Department</label>

                        <select th:field="*{department.id}"
                                class="form-select">

                            <option value="">Select Department</option>

                            <option th:each="dept : ${departments}"
                                    th:value="${dept.id}"
                                    th:text="${dept.departmentName}">
                            </option>

                        </select>
                    </div>

                    <!-- SALARY -->
                    <div class="form-section">
                        <label>Basic Salary</label>
                        <input type="number"
                               th:field="*{salaryDetails.basicSalary}"
                               class="form-control"
                               placeholder="Enter basic salary">
                    </div>

                    <div class="form-section">
                        <label>Bonus</label>
                        <input type="number"
                               th:field="*{salaryDetails.bonus}"
                               class="form-control"
                               placeholder="Enter bonus">
                    </div>

                    <div class="form-section">
                        <label>Deduction</label>
                        <input type="number"
                               th:field="*{salaryDetails.deduction}"
                               class="form-control"
                               placeholder="Enter deduction">
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-flex justify-content-between mt-4">

                        <button type="submit" class="btn btn-success">
                            <i class="fa fa-save"></i> Save Employee
                        </button>

                        <a th:href="@{/employees}" class="btn btn-secondary">
                            <i class="fa fa-arrow-left"></i> Back
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
