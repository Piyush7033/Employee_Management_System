<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; }
        input[type="email"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .error { color: #dc3545; margin-bottom: 15px; font-size: 14px; }
        .back-link { display: block; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Forgot Password?</h2>
    <p>Apni registered Email ID dalein, hum aapko ek 6-digit OTP bhejenge.</p>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/auth/forgot-password}" method="post">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@company.com" required />
        </div>
        <button type="submit">Get OTP</button>
    </form>

    <a class="back-link" th:href="@{/auth/loginPage}">← Back to Login</a>
</div>

</body>
</html>
