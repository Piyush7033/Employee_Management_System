<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Department List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            color: white;
        }

        .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: #212529;
            color: white;
        }

        .btn-custom {
            border-radius: 50px;
            font-weight: 600;
        }

        .header-title {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .badge-id {
            background: #6c757d;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
        }

    </style>
</head>

<body>

<div class="container mt-4">

    <div class="card-box">

        <!-- HEADER -->
        <div class="header-title">
            <h2><i class="fa-solid fa-building"></i> Department List</h2>
            <p>Manage all organization departments</p>
        </div>

        <!-- TOP ACTION BAR -->
        <div class="top-bar">

            <a th:href="@{/departments/add}" class="btn btn-success btn-custom">
                <i class="fa fa-plus"></i> Add Department
            </a>

            <a th:href="@{/dashboard}" class="btn btn-light btn-custom">
                <i class="fa fa-arrow-left"></i> Back
            </a>

        </div>

        <!-- TABLE -->
        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Department Name</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(departments)}">
                    <td colspan="4" class="text-center text-muted">
                        No Departments Found
                    </td>
                </tr>

                <tr th:each="dept : ${departments}">

                    <td>
                        <span class="badge-id" th:text="${dept.id}"></span>
                    </td>

                    <td th:text="${dept.departmentName}"></td>

                    <td th:text="${dept.description}"></td>

                    <td>

                        <a th:href="@{/departments/edit/{id}(id=${dept.id})}"
                           class="btn btn-warning btn-sm btn-custom">
                            <i class="fa fa-edit"></i> Edit
                        </a>

                        <a th:href="@{/departments/delete/{id}(id=${dept.id})}"
                           class="btn btn-danger btn-sm btn-custom"
                           onclick="return confirm('Are you sure?')">
                            <i class="fa fa-trash"></i> Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
