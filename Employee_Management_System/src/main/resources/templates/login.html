<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: #333333;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
        }

        .subtitle {
            color: #666666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444444;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background-color: #fafafa;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #4a90e2;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        .error-msg {
            background-color: #fde8e8;
            color: #e53e3e;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid #e53e3e;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666666;
        }

        .footer-text a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your details to sign in</p>

    <div class="error-msg" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/auth/login}" th:object="${loginRequest}" method="POST">

        <div class="form-group">
            <label for="userId">User ID</label>
            <input type="text" id="userId" th:field="*{userId}" required placeholder="Enter your User ID"/>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" required placeholder="Enter your password"/>
        </div>

        <div class="form-group">
            <label for="workMode">Work Mode</label>
            <!-- Style input ki tarah hi rakha hai taaki theme match kare -->
            <select id="workMode" th:field="*{workMode}" required
                    style="width: 100%; padding: 12px 16px; border: 1px solid #cccccc; border-radius: 8px; font-size: 15px; background-color: #fafafa; outline: none; cursor: pointer;">
                <option value="WFO">Work From Office</option>
                <option value="WFH">Work From Home</option>
            </select>
        </div>

        <button type="submit">Sign In</button>
    </form>

    <p class="footer-text">
        Don't have an account? <a th:href="@{/auth/employeeRegisterForm}">Register here</a>
    </p>
    <a th:href="@{/auth/forgot-password}">Forgot Password?</a>
</div>

</body>
</html>
