<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Employee Timesheets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 40px 20px;
        }
        .manage-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .table { color: white !important; }
        .table th { background: rgba(0, 0, 0, 0.3) !important; color: #fff !important; }
        .table td { background: transparent !important; color: white !important; border-color: rgba(255, 255, 255, 0.1); }
        .badge-pending { background-color: #ffc107; color: #000; font-weight: bold; }
        .badge-approved { background-color: #198754; color: #fff; font-weight: bold; }
        .badge-rejected { background-color: #dc3545; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="manage-panel">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h2><i class="fa-solid fa-list-check me-2"></i>Review Employee Timesheets</h2>
                <p class="text-white-50 m-0">Monitor logs, verify durations, and approve daily entries</p>
            </div>
            <a href="/manager/dashboard" class="btn btn-light rounded-pill px-4"><i class="fa-solid fa-arrow-left me-1"></i> Dashboard</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Emp ID</th>
                    <th>Date</th>
                    <th>Hours</th>
                    <th>Mode</th>
                    <th>Task Description</th>
                    <th>Status</th>
                    <th class="text-center">Review Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${allLogs}">
                    <td th:text="${log.employeeId}" class="fw-bold">EMP102</td>
                    <td th:text="${log.date}">2026-06-22</td>
                    <td><span class="badge bg-dark" th:text="${log.hoursWorked + ' hrs'}">9.0 hrs</span></td>
                    <td th:text="${log.workMode}">WFH</td>
                    <td th:text="${log.taskDescription}" class="text-white-50">API optimization and bug fixes.</td>
                    <td>
                        <span th:if="${log.status == 'PENDING'}" class="badge badge-pending">PENDING</span>
                        <span th:if="${log.status == 'APPROVED'}" class="badge badge-approved"><i class="fa-solid fa-check me-1"></i>APPROVED</span>
                        <span th:if="${log.status == 'REJECTED'}" class="badge badge-rejected"><i class="fa-solid fa-xmark me-1"></i>REJECTED</span>
                    </td>
                    <td>
                        <div th:if="${log.status == 'PENDING'}" class="d-flex justify-content-center gap-2">
                            <form th:action="@{/timesheet/status/{id}(id=${log.id})}" method="POST" class="m-0">
                                <input type="hidden" name="action" value="approve" />
                                <button type="submit" class="btn btn-success btn-sm px-3 rounded-pill"><i class="fa-solid fa-check"></i> Approve</button>
                            </form>
                            <form th:action="@{/timesheet/status/{id}(id=${log.id})}" method="POST" class="m-0">
                                <input type="hidden" name="action" value="reject" />
                                <button type="submit" class="btn btn-danger btn-sm px-3 rounded-pill"><i class="fa-solid fa-xmark"></i> Reject</button>
                            </form>
                        </div>
                        <div th:unless="${log.status == 'PENDING'}" class="text-center text-white-50 small">
                            <i class="fa-solid fa-lock me-1"></i> Locked
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(allLogs)}">
                    <td colspan="7" class="text-center py-5 text-white-50">
                        <i class="fa-solid fa-folder-open display-6 mb-2 d-block"></i> No timesheet submissions recorded yet.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
