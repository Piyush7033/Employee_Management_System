<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 40px 20px;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        .form-control:focus { background: rgba(255,255,255,0.2) !important; color: white; }
        .section-title {
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
            margin-top: 25px;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fa-solid fa-user-gear me-2"></i>My Personal Profile</h2>
        <a href="/employee/dashboard" class="btn btn-light rounded-pill px-4"><i class="fa-solid fa-house me-1"></i> Dashboard</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success bg-success text-white border-0 rounded-pill text-center py-2 mb-4">
        <i class="fa-solid fa-circle-check me-1"></i> Profile Updated Successfully!
    </div>

    <div class="profile-card">
        <form th:action="@{/profile/save}" th:object="${profile}" method="POST">

            <h4 class="section-title text-info"><i class="fa-solid fa-id-card me-2"></i>Personal Details</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter Full Name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="Enter Phone Number">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" th:field="*{dob}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <input type="text" th:field="*{gender}" class="form-control" placeholder="e.g. Male / Female">
                </div>
            </div>

            <h4 class="section-title text-warning"><i class="fa-solid fa-graduation-cap me-2"></i>Education Academic Details</h4>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Highest Qualification</label>
                    <input type="text" th:field="*{highestQualification}" class="form-control" placeholder="e.g. B.Tech / MCA">
                </div>
                <div class="col-md-5">
                    <label class="form-label">University/College</label>
                    <input type="text" th:field="*{university}" class="form-control" placeholder="University Name">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Passing Year</label>
                    <input type="text" th:field="*{passingYear}" class="form-control" placeholder="e.g. 2024">
                </div>
            </div>

            <h4 class="section-title text-success"><i class="fa-solid fa-building-columns me-2"></i>Bank Accounts Details</h4>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Bank Name</label>
                    <input type="text" th:field="*{bankName}" class="form-control" placeholder="e.g. SBI, HDFC">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Account Number</label>
                    <input type="text" th:field="*{accountNumber}" class="form-control" placeholder="Account Number">
                </div>
                <div class="col-md-4">
                    <label class="form-label">IFSC Code</label>
                    <input type="text" th:field="*{ifscCode}" class="form-control" placeholder="IFSC Code">
                </div>
            </div>

            <h4 class="section-title text-danger"><i class="fa-solid fa-location-dot me-2"></i>Address Details</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Current Address</label>
                    <textarea th:field="*{currentAddress}" class="form-control" rows="3" placeholder="Where you reside currently..."></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Permanent Address</label>
                    <textarea th:field="*{permanentAddress}" class="form-control" rows="3" placeholder="Permanent home address..."></textarea>
                </div>
            </div>

            <div class="text-center mt-4 pt-3">
                <button type="submit" class="btn btn-light rounded-pill px-5 btn-lg fw-bold text-dark shadow">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Save & Update Profile
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
