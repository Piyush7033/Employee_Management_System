<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            max-width: 500px;
            width: 100%;
        }
        .error-icon {
            font-size: 70px;
            color: #ffc107; /* Warning yellow color */
        }
    </style>
</head>
<body>

<div class="text-center error-card">
    <div class="mb-4">
        <i class="fa-solid fa-triangle-exclamation error-icon"></i>
    </div>
    <h1 class="display-5 fw-bold mb-3">403 - Access Denied</h1>
    <h4 class="text-white-50 mb-4">You don't have authorization to view this page.</h4>

    <p class="mb-4 small text-wrap border border-light border-opacity-10 p-3 rounded bg-dark bg-opacity-25">
        Sorry, this section is restricted only to <strong>Managers / Administrators</strong>.
        If you believe this is a mistake, please contact your IT support team.
    </p>

    <div class="d-grid gap-2">
        <a href="/dashboard" class="btn btn-light rounded-pill fw-bold">
            <i class="fa-solid fa-house me-2"></i>Back to Dashboard
        </a>
    </div>
</div>

</body>
</html>
