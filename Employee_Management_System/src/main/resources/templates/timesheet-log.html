<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log Daily Timesheet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 40px 20px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            margin-bottom: 30px;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .form-select option { background: #764ba2; color: white; }
        .table { color: white !important; }
        .table th { background: rgba(0, 0, 0, 0.3) !important; color: #fff !important; }
        .table td { background: transparent !important; color: white !important; border-color: rgba(255, 255, 255, 0.1); }
        .badge-pending { background-color: #ffc107; color: #000; }
        .badge-approved { background-color: #198754; color: #fff; }
        .badge-rejected { background-color: #dc3545; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fa-solid fa-clock-column me-2"></i>Daily Timesheet Log</h2>
        <a href="/dashboard" class="btn btn-light rounded-pill px-4"><i class="fa-solid fa-house me-1"></i> Dashboard</a>
    </div>

    <div class="glass-panel">
        <h4 class="mb-3"><i class="fa-solid fa-pen-to-square me-2"></i>Submit New Entry</h4>
        <form th:action="@{/timesheet/submit}" th:object="${timesheet}" method="POST">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date" th:field="*{date}" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Hours Worked</label>
                    <input type="number" step="0.5" min="0" max="24" th:field="*{hoursWorked}" class="form-control" placeholder="e.g. 8.5" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Work Mode</label>
                    <select th:field="*{workMode}" class="form-select" required>
                        <option value="Office">Office</option>
                        <option value="WFH">Work From Home (WFH)</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold">
                        <i class="fa-solid fa-paper-plane me-1"></i> Submit Log
                    </button>
                </div>
                <div class="col-12">
                    <label class="form-label">Task Description</label>
                    <textarea th:field="*{taskDescription}" class="form-control" rows="2" placeholder="Describe the work tasks completed today..." required></textarea>
                </div>
            </div>
        </form>
    </div>

    <div class="glass-panel">
        <h4 class="mb-3"><i class="fa-solid fa-history me-2"></i>Your Log History</h4>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Hours</th>
                    <th>Mode</th>
                    <th>Task Description</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${myLogs}">
                    <td th:text="${log.date}" class="fw-bold">2026-06-22</td>
                    <td th:text="${log.hoursWorked + ' hrs'}">8 hrs</td>
                    <td><span class="badge bg-light text-dark" th:text="${log.workMode}">Office</span></td>
                    <td th:text="${log.taskDescription}">Completed authentication module setup</td>
                    <td>
                        <span th:if="${log.status == 'PENDING'}" class="badge badge-pending">PENDING</span>
                        <span th:if="${log.status == 'APPROVED'}" class="badge badge-approved">APPROVED</span>
                        <span th:if="${log.status == 'REJECTED'}" class="badge badge-rejected">REJECTED</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(myLogs)}">
                    <td colspan="5" class="text-center py-4 text-white-50">No logs found. Start submitting your daily tasks above!</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
