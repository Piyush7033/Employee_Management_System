<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Daily Timesheet</title>
    <!-- Google Fonts for Corporate Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            min-height: 100vh;
            color: #333333;
            padding: 40px 0;
        }
        .page-header h2 {
            font-weight: 700;
            color: #1e293b;
            font-size: 1.6rem;
        }
        .btn-dashboard {
            background-color: #ffffff;
            color: #475569;
            border: 1px solid #cbd5e1;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-dashboard:hover {
            background-color: #f8fafc;
            color: #1e293b;
            border-color: #94a3b8;
        }
        .panel-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            margin-bottom: 30px;
        }
        .panel-title {
            font-weight: 600;
            color: #1e293b;
            font-size: 1.25rem;
            margin-bottom: 24px;
        }
        .form-label {
            font-weight: 500;
            color: #475569;
            font-size: 0.9rem;
        }
        .form-control, .form-select {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #1e293b !important;
            padding: 10px 14px;
            font-size: 0.95rem;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15) !important;
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
        .btn-submit-custom {
            background-color: #4f46e5;
            color: white;
            font-weight: 500;
            padding: 11px;
            border-radius: 8px;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-submit-custom:hover {
            background-color: #4338ca;
            color: white;
        }
        /* Custom Table Styling */
        .table-responsive-custom {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .table {
            margin-bottom: 0;
        }
        .table thead th {
            background-color: #f8fafc !important;
            color: #64748b !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .table tbody td {
            padding: 16px;
            vertical-align: middle;
            color: #334155 !important;
            font-size: 0.95rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .table tbody tr:last-child td {
            border-bottom: none;
        }
        .table-hover tbody tr:hover {
            background-color: #f8fafc;
        }
        /* Clean Soft Badges */
        .badge-mode {
            background-color: #f1f5f9;
            color: #475569;
            padding: 6px 12px;
            font-weight: 500;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .badge-pending-clean { background-color: #fef9c3; color: #a16207; padding: 6px 12px; border-radius: 6px; font-weight: 500; font-size: 0.8rem; }
        .badge-approved-clean { background-color: #dcfce7; color: #15803d; padding: 6px 12px; border-radius: 6px; font-weight: 500; font-size: 0.8rem; }
        .badge-rejected-clean { background-color: #fee2e2; color: #b91c1c; padding: 6px 12px; border-radius: 6px; font-weight: 500; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center mb-4 page-header">
        <h2><i class="fa-solid fa-clock text-indigo me-2" style="color: #4f46e5;"></i>Daily Timesheet Log</h2>
        <a href="/employee/dashboard" class="btn btn-dashboard rounded-pill px-4 shadow-sm">
            <i class="fa-solid fa-house me-1"></i> Dashboard
        </a>
    </div>

    <!-- Submit Log Card -->
    <div class="panel-card">
        <h4 class="panel-title"><i class="fa-solid fa-pen-to-square me-2" style="color: #64748b;"></i>Submit New Entry</h4>
        <form th:action="@{/timesheet/submit}" th:object="${timesheet}" method="POST">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date" th:field="*{date}" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Hours Worked</label>
                    <input type="number" step="0.5" min="0" max="24" th:field="*{hoursWorked}" class="form-control" placeholder="e.g. 8.5" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Work Mode</label>
                    <select th:field="*{workMode}" class="form-select" required>
                        <option value="Office">Office</option>
                        <option value="WFH">Work From Home (WFH)</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-submit-custom w-100 shadow-sm fw-bold">
                        <i class="fa-solid fa-paper-plane me-1"></i> Submit Log
                    </button>
                </div>
                <div class="col-12">
                    <label class="form-label">Task Description</label>
                    <textarea th:field="*{taskDescription}" class="form-control" rows="2" placeholder="Describe the work tasks completed today..." required></textarea>
                </div>
            </div>
        </form>
    </div>

    <!-- History Log Card -->
    <div class="panel-card">
        <h4 class="panel-title"><i class="fa-solid fa-history me-2" style="color: #64748b;"></i>Your Log History</h4>
        <div class="table-responsive-custom">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Hours</th>
                    <th>Mode</th>
                    <th>Task Description</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${myLogs}">
                    <td th:text="${log.date}" class="fw-semibold text-dark">2026-06-22</td>
                    <td th:text="${log.hoursWorked + ' hrs'}" class="text-secondary">8 hrs</td>
                    <td><span class="badge-mode" th:text="${log.workMode}">Office</span></td>
                    <td th:text="${log.taskDescription}" class="text-secondary">Completed authentication module setup</td>
                    <td>
                        <!-- Premium clean badges without heavy black/white solid backgrounds -->
                        <span th:if="${log.status == 'PENDING'}" class="badge-pending-clean">PENDING</span>
                        <span th:if="${log.status == 'APPROVED'}" class="badge-approved-clean">APPROVED</span>
                        <span th:if="${log.status == 'REJECTED'}" class="badge-rejected-clean">REJECTED</span>
                    </td>
                </tr>
                <!-- Empty State -->
                <tr th:if="${#lists.isEmpty(myLogs)}">
                    <td colspan="5" class="text-center py-5 text-muted">No logs found. Start submitting your daily tasks above!</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
