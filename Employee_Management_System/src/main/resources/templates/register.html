<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: #333333;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 600;
            text-align: center;
        }

        .subtitle {
            color: #666666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #444444;
            font-size: 13px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
            background-color: #fafafa;
        }

        input:focus, select:focus {
            border-color: #4a90e2;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.99);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666666;
        }

        .footer-text a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Responsive adjustment for small screens */
        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Employee Registration</h2>
    <p class="subtitle">Create an account to join the management system</p>

    <form th:action="@{/auth/register}" th:object="${registerEmployee}" method="POST">

        <div class="form-grid">
            <div class="form-group full-width">
                <label for="name">Full Name</label>
                <input type="text" id="name" th:field="*{name}" required placeholder="John Doe"/>
            </div>


            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" th:field="*{role}" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="ROLE_HR">HR</option>
                    <option value="ROLE_EMPLOYEE">Employee</option>
                    <option value="ROLE_ADMIN">Admin</option>
                    <option value="ROLE_MANAGER">Manager</option>
                    <option value="ROLE_TeamLead">TeamLead</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label for="email">Email Address</label>
                <input type="email" id="email" th:field="*{email}" required placeholder="name@company.com"/>
            </div>

            <div class="form-group full-width">
                <label for="phoneNumber">Phone Number</label>
                <input type="text" id="phoneNumber" th:field="*{phoneNumber}" required placeholder="1234567890"/>
            </div>

<!--            <div class="col-md-6">-->
<!--                <label class="form-label" for="dob">Date of Birth</label>-->
<!--                <input type="date" id="dob" th:field="*{dob}" class="form-control" required>-->
<!--            </div>-->

        </div>
        <button type="submit">Register Employee</button>
    </form>

    <p class="footer-text">
        Already have an account? <a th:href="@{/auth/loginPage}">Sign In here</a>
    </p>
</div>

</body>
</html>
