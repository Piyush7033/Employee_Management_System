<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Salary Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 18px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 18px;
            border-radius: 18px 18px 0 0;
            text-align: center;
        }

        .section-title {
            font-weight: 700;
            color: #2c3e50;
        }

        .net-salary {
            font-size: 20px;
            font-weight: 700;
            color: #198754;
        }

        .highlight {
            background: #e9f7ef !important;
        }

        .btn {
            border-radius: 10px;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .icon {
            margin-right: 6px;
        }

        .badge-soft {
            padding: 6px 10px;
            border-radius: 8px;
        }

        .salary-box {
            transition: 0.3s;
        }

        .salary-box:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="card">

        <!-- HEADER -->
        <div class="header">
            <h3><i class="fa-solid fa-sack-dollar"></i> Salary Management System</h3>
        </div>

        <div class="card-body p-4">

            <!-- ================= FORM ================= -->
            <div class="card p-4 mb-4 salary-box">

                <h5 class="section-title mb-3">
                    <i class="fa-solid fa-user-pen icon"></i> Assign / Update Salary
                </h5>

                <form th:action="@{/salary/save}" method="post">

                    <!-- EMPLOYEE -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Select Employee</label>

                        <select class="form-select" name="employeeId" required
                                th:if="${employees != null and !#lists.isEmpty(employees)}">

                            <option value="">-- Choose Employee --</option>

                            <option th:each="emp : ${employees}"
                                    th:value="${emp.id}"
                                    th:text="${emp.id + ' - ' + emp.name}">
                            </option>

                        </select>

                        <div th:if="${employees == null or #lists.isEmpty(employees)}"
                             class="alert alert-danger mt-2">
                            No employees found. Please add employees first.
                        </div>
                    </div>

                    <!-- INPUTS -->
                    <div class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label">Basic Salary</label>
                            <input type="number" step="0.01" class="form-control"
                                   name="basicSalary" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Bonus</label>
                            <input type="number" step="0.01" class="form-control"
                                   name="bonus" value="0">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Deduction</label>
                            <input type="number" step="0.01" class="form-control"
                                   name="deduction" value="0">
                        </div>

                    </div>

                    <div class="text-center mt-4">
                        <button class="btn btn-success px-4">
                            💾 Save Salary
                        </button>
                    </div>

                </form>

            </div>

            <!-- ================= CURRENT SALARY ================= -->
            <div class="card p-4 mb-4 salary-box">

                <h5 class="section-title mb-3">
                    <i class="fa-solid fa-file-invoice-dollar icon"></i> Current Salary Details
                </h5>

                <div th:if="${salary == null}" class="alert alert-warning text-center">
                    No salary assigned yet.
                </div>

                <div th:if="${salary != null}">

                    <table class="table table-bordered">

                        <tr>
                            <th>Basic Salary</th>
                            <td th:text="${salary.basicSalary}"></td>
                        </tr>

                        <tr>
                            <th>Bonus</th>
                            <td th:text="${salary.bonus}"></td>
                        </tr>

                        <tr>
                            <th>Deduction</th>
                            <td th:text="${salary.deduction}"></td>
                        </tr>

                        <tr class="table-success highlight">
                            <th>Net Salary</th>
                            <td class="net-salary" th:text="${netSalary}"></td>
                        </tr>

                    </table>

                </div>

            </div>

            <!-- ================= HISTORY ================= -->
            <div class="card p-4 mb-4 salary-box">

                <h5 class="section-title mb-3">
                    <i class="fa-solid fa-clock-rotate-left icon"></i> Salary History
                </h5>

                <div th:if="${salaries == null or #lists.isEmpty(salaries)}"
                     class="alert alert-info text-center">
                    No salary history available.
                </div>

                <div th:if="${salaries != null and !#lists.isEmpty(salaries)}">

                    <table class="table table-striped table-hover">

                        <thead class="table-dark">
                        <tr>
                            <th>Employee</th>
                            <th>Basic</th>
                            <th>Bonus</th>
                            <th>Deduction</th>
                            <th>Net</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="s : ${salaries}">
                            <td th:text="${s.employee.name}"></td>
                            <td th:text="${s.basicSalary}"></td>
                            <td th:text="${s.bonus}"></td>
                            <td th:text="${s.deduction}"></td>
                            <td th:text="${s.basicSalary + s.bonus - s.deduction}"></td>
                        </tr>
                        </tbody>

                    </table>

                </div>

            </div>

            <!-- ================= BUTTONS ================= -->
            <div class="text-center">

                <a th:href="@{/salary}" class="btn btn-outline-primary me-2">
                    🔄 Refresh
                </a>

                <a th:href="@{/employees}" class="btn btn-primary me-2">
                    👥 Employees
                </a>

                <a th:href="@{/employee/dashboard}" class="btn btn-dark">
                    🏠 Dashboard
                </a>

            </div>

        </div>
    </div>

</div>

</body>
</html>
