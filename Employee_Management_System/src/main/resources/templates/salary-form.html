<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Salary Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #dbeafe, #f0f4ff);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 18px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 15px;
            border-radius: 18px 18px 0 0;
            text-align: center;
        }

        .form-title {
            font-weight: 700;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }

        .hint {
            font-size: 12px;
            color: #6c757d;
        }

        .icon {
            margin-right: 6px;
        }

        .salary-icon {
            font-size: 28px;
            margin-bottom: 10px;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card">

                <!-- HEADER -->
                <div class="header">
                    <div class="salary-icon">
                        <i class="fa-solid fa-sack-dollar"></i>
                    </div>
                    <h4 class="form-title">Salary Management</h4>
                </div>

                <div class="card-body p-4">

                    <form th:action="@{/salary/save}" method="post">

                        <!-- Employee ID -->
                        <input type="hidden"
                               name="employeeId"
                               th:value="${employeeId}">

                        <!-- BASIC SALARY -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-money-bill icon"></i> Basic Salary
                            </label>
                            <input type="number"
                                   step="0.01"
                                   name="basicSalary"
                                   class="form-control"
                                   th:value="${salary != null ? salary.basicSalary : 0}"
                                   placeholder="Enter basic salary"
                                   required>
                            <div class="hint">Base salary of employee</div>
                        </div>

                        <!-- BONUS -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-gift icon"></i> Bonus
                            </label>
                            <input type="number"
                                   step="0.01"
                                   name="bonus"
                                   class="form-control"
                                   th:value="${salary != null ? salary.bonus : 0}"
                                   placeholder="Enter bonus">
                            <div class="hint">Performance / extra reward</div>
                        </div>

                        <!-- DEDUCTION -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-circle-minus icon"></i> Deduction
                            </label>
                            <input type="number"
                                   step="0.01"
                                   name="deduction"
                                   class="form-control"
                                   th:value="${salary != null ? salary.deduction : 0}"
                                   placeholder="Enter deduction">
                            <div class="hint">Tax / PF / penalty</div>
                        </div>

                        <!-- BUTTONS -->
                        <div class="d-flex justify-content-between mt-4">

                            <a th:href="@{/salary}" class="btn btn-outline-secondary">
                                ⬅ Back
                            </a>

                            <button type="submit" class="btn btn-success">
                                💾 Save Salary
                            </button>

                        </div>

                    </form>

                    <!-- DASHBOARD BUTTON -->
                    <div class="text-center mt-3">
                        <a th:href="@{/employee/dashboard}" class="btn btn-dark">
                            🏠 Back to Dashboard
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
