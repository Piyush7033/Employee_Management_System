<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Apply Leave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: white; padding-top: 30px; }
        .box { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    </style>
</head>
<body>
<div class="container">
    <div class="row g-4">
        <div class="col-md-5">
            <div class="box">
                <h3>Apply for Leave</h3>
                <div th:if="${param.success}" class="alert alert-success bg-success text-white border-0">Leave applied successfully!</div>
                <form th:action="@{/leave/submit}" th:object="${leaveRequest}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Leave Type</label>
                        <select th:field="*{leaveType}" class="form-select" required>
                            <option value="Sick Leave">Sick Leave</option>
                            <option value="Casual Leave">Casual Leave</option>
                            <option value="Earned Leave">Earned Leave</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" th:field="*{startDate}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End Date</label>
                        <input type="date" th:field="*{endDate}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        <textarea th:field="*{reason}" class="form-control" rows="3" placeholder="Reason for leave" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-light w-100 fw-bold">Submit Application</button>
                </form>
                <a th:href="@{/dashboard}" class="d-block text-center text-white mt-3 text-decoration-none">← Back to Dashboard</a>
            </div>
        </div>

        <div class="col-md-7">
            <div class="box">
                <h3>My Leave History</h3>
                <table class="table table-dark table-striped mt-3">
                    <thead>
                    <tr>
                        <th>Type</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="leave : ${myLeaves}">
                        <td th:text="${leave.leaveType}"></td>
                        <td th:text="${leave.startDate}"></td>
                        <td th:text="${leave.endDate}"></td>
                        <td>
                                <span th:text="${leave.status}"
                                      th:classappend="${leave.status == 'APPROVED' ? 'badge bg-success' : (leave.status == 'REJECTED' ? 'badge bg-danger' : 'badge bg-warning text-dark')}">
                                </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
