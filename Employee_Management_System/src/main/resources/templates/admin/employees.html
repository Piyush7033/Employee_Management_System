<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --sidebar-submenu-bg: #111827;
            --bg-main: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #7367f0;
        }

        /* =========================
           GLOBAL
        ========================= */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background: var(--bg-main);
            font-family: 'Segoe UI', sans-serif;
            overflow-x:hidden;
        }

        /* =========================
           SIDEBAR
        ========================= */
        .sidebar{
            width:260px;
            background:var(--sidebar-bg);
            color:#fff;
            position:fixed;
            top:0;
            left:0;
            height:100vh;
            z-index:1000;
            overflow-y:auto;
        }

        .sidebar-brand{
            padding:24px;
            font-size:20px;
            font-weight:700;
            border-bottom:1px solid rgba(255,255,255,.08);
        }

        .sidebar-brand a{
            color:#fff;
            text-decoration:none;
            display:flex;
            <ali></ali>gn-items:center;
            gap:10px;
        }

        .sidebar-menu{
            list-style:none;
            padding:15px;
        }

        .sidebar-menu li{
            margin-bottom:6px;
        }

        .sidebar-menu a,
        .sidebar-menu .dropdown-trigger{
            display:flex;
            align-items:center;
            width:100%;
            padding:12px 16px;
            border:none;
            background:none;
            border-radius:10px;
            color:#94a3b8;
            text-decoration:none;
            font-size:15px;
            transition:.3s;
        }

        .sidebar-menu a i,
        .sidebar-menu .dropdown-trigger i:first-child{
            width:20px;
            margin-right:12px;
        }

        .sidebar-menu a:hover,
        .sidebar-menu li.active a,
        .sidebar-menu .dropdown-trigger:hover{
            background:var(--sidebar-hover);
            color:#fff;
        }

       /* =========================
   MAIN CONTENT
========================= */
.main-content{
    margin-left:260px;
    padding:30px;
    min-height:100vh;
    background:#f8fafc;
}

/* =========================
   PAGE HEADER
========================= */
.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.page-title{
    font-size:42px;
    font-weight:700;
    color:#15224b;
    margin:0;
}

/* =========================
   EMPLOYEE CARD
========================= */
.employee-card{
    background:#ffffff;
    border-radius:20px;
    padding:35px;
    border:1px solid #e5e7eb;
    box-shadow:0 2px 10px rgba(15,23,42,.06);
}

/* =========================
   CARD HEADER
========================= */
.card-header-custom{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:30px;
    padding-bottom:15px;
    border-bottom:1px solid #edf1f7;
}

.card-header-custom i{
    color:#7367f0;
    font-size:28px;
}

.card-header-custom h4{
    margin:0;
    font-size:32px;
    font-weight:700;
    color:#15224b;
}

/* =========================
   FORM LABELS
========================= */
label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    font-weight:700;
    color:#334e7d;
    text-transform:uppercase;
}

/* =========================
   INPUTS
========================= */
.form-control,
.form-select{
    height:56px;
    border-radius:12px;
    border:1px solid #dbe4f0;
    background:#fff;
    font-size:16px;
    color:#15224b;
}

.form-control:focus,
.form-select:focus{
    border-color:#7367f0;
    box-shadow:0 0 0 .15rem rgba(115,103,240,.15);
}

input[type="file"]{
    height:auto;
    padding:12px;
}

/* =========================
   BUTTONS
========================= */
.btn-save{
    background:#7367f0;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:12px 28px;
    font-weight:600;
}

.btn-save:hover{
    background:#5f52e8;
    color:#fff;
}

.btn-back{
    background:#fff;
    color:#334e7d;
    border:1px solid #dbe4f0;
    border-radius:12px;
    padding:12px 28px;
    font-weight:600;
}

.btn-back:hover{
    background:#f8fafc;
}

/* =========================
   FORM SPACING
========================= */
.form-section{
    margin-bottom:22px;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:992px){

    .sidebar{
        width:220px;
    }

    .main-content{
        margin-left:220px;
        padding:20px;
    }
}

@media(max-width:768px){

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main-content{
        margin-left:0;   /* FIXED */
        padding:15px;
    }

    .employee-card{
        padding:20px;
    }

    .page-title{
        font-size:28px;
    }
}
        }
    </style>
</head>

<body>

<div class="dashboard-container">
    <aside th:replace="~{admin/sidebar-admin :: sidebar-component}"></aside>

    <div class="main-content">

        <div class="page-header">
            <h5 class="page-title">Employee Management</h5>
        </div>

        <div class="employee-card">

        <div class="card-header-custom">
            <i class="fa-solid fa-user-plus"></i>
            <h4>Add / Update Employee</h4>
        </div>

        <form th:action="@{/admin/employees/save}"
              method="post"
              enctype="multipart/form-data">

            <div class="row">

                <div class="col-md-6 mb-4">
                    <label>Full Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="Enter employee name">
                </div>

                <div class="col-md-6 mb-4">
                    <label>Email Address</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Enter email">
                </div>

                <div class="col-md-6 mb-4">
                    <label>Phone Number</label>
                    <input type="text"
                           name="phone"
                           class="form-control"
                           placeholder="Enter phone number">
                </div>

                <div class="col-md-6 mb-4">
                    <label>Joining Date</label>
                    <input type="date"
                           name="joiningDate"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-4">
                    <label>Department</label>
                    <select name="departmentId"
                            class="form-select">

                        <option value="">
                            Select Department
                        </option>

                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.departmentName}">
                        </option>

                    </select>
                </div>

                <div class="col-md-6 mb-4">
                    <label>Employee Image</label>
                    <input type="file"
                           name="imageFile"
                           class="form-control">
                </div>

                <div class="col-md-4 mb-4">
                    <label>Basic Salary</label>
                    <input type="number"
                           name="basicSalary"
                           class="form-control"
                           placeholder="₹ Basic Salary">
                </div>

                <div class="col-md-4 mb-4">
                    <label>Bonus</label>
                    <input type="number"
                           name="bonus"
                           class="form-control"
                           placeholder="₹ Bonus">
                </div>

                <div class="col-md-4 mb-4">
                    <label>Deduction</label>
                    <input type="number"
                           name="deduction"
                           class="form-control"
                           placeholder="₹ Deduction">
                </div>

            </div>

            <div class="d-flex justify-content-end gap-3 mt-3">

                <a th:href="@{/admin/dashboard}"
                   class="btn btn-back">
                    Back
                </a>

                <button type="submit"
                        class="btn btn-save">
                    Save Employee
                </button>

            </div>

        </form>

    </div>

</div>
</div>

</body>
</html>
