<div class="card shadow-sm border-0">

    <div class="card-header bg-black text-white">
        <h4 class="mb-0">All Employees</h4>
    </div>

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Date of Birth</th>
                    <th>Joining Date</th>
                    <th>Work Mode</th>
                    <th>Department</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(employees)}">
                    <td colspan="9" class="text-center text-muted py-3">
                        No Employees Found
                    </td>
                </tr>

                <tr th:each="emp : ${employees}">

                    <td th:text="${emp.id}"></td>

                    <td th:text="${emp.name}"></td>

                    <td th:text="${emp.email}"></td>

                    <td th:text="${emp.phone}"></td>

                    <td th:text="${#temporals.format(emp.dateOfBirth, 'dd-MM-yyyy')}"></td>

                    <td th:text="${#temporals.format(emp.joiningDate, 'dd-MM-yyyy')}"></td>

                    <td th:text="${emp.workMode}"></td>

                    <td th:text="${emp.department != null ? emp.department.departmentName : 'N/A'}"></td>

                    <td>
                        <div class="d-flex gap-2">

                            <a th:href="@{/admin/employee/view/{id}(id=${emp.id})}"
                               class="btn btn-sm btn-info text-white">
                                View
                            </a>

                            <a th:href="@{/admin/employee/edit/{id}(id=${emp.id})}"
                               class="btn btn-sm btn-warning">
                                Edit
                            </a>

                        </div>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
