<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Department</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .page-wrapper{
            max-width:850px;
            margin:40px auto;
        }

        .card{
            border:none;
            border-radius:14px;
            box-shadow:0 8px 25px rgba(0,0,0,.08);
        }

        .card-header{
            background:#0d6efd;
            color:#fff;
            padding:18px 25px;
            border-radius:14px 14px 0 0 !important;
        }

        .form-label{
            font-weight:600;
        }

        .required{
            color:red;
        }

        .btn{
            min-width:120px;
        }
    </style>

</head>
<body>

<div class="container page-wrapper">

    <div class="card">

        <div class="card-header">
            <h3 class="mb-0">
                Add Department
            </h3>
        </div>

        <div class="card-body">

            <form th:action="@{/admin/departments/save}"
                  th:object="${department}"
                  method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Department Name
                            <span class="required">*</span>
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{departmentName}"
                               placeholder="Enter Department Name"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Department Code
                            <span class="required">*</span>
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{departmentCode}"
                               placeholder="Example : IT001"
                               required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea class="form-control"
                              rows="4"
                              th:field="*{description}"
                              placeholder="Department Description">
                    </textarea>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Department Head
                        </label>

                        <select class="form-select"
                                th:field="*{departmentHeadId}">

                            <option value="">Select Employee</option>

                            <option
                                    th:each="emp : ${employees}"
                                    th:value="${emp.id}"
                                    th:text="${emp.name}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Status
                        </label>

                        <select class="form-select"
                                th:field="*{status}">

                            <option value="ACTIVE">Active</option>
                            <option value="INACTIVE">Inactive</option>

                        </select>

                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">

                    <a th:href="@{/admin/departments}"
                       class="btn btn-secondary">
                        Cancel
                    </a>

                    <button class="btn btn-primary"
                            type="submit">
                        Save Department
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
