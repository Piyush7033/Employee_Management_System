            </a>
        </li>

        <!-- Employee Management -->
        <li>
            <button class="dropdown-trigger"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#employeeSubmenu"
                    aria-expanded="false">
                <i class="fa-solid fa-users"></i>
                <span>Employee Management</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="collapse" id="employeeSubmenu">
                <ul class="submenu">
                    <li>
                        <a th:href="@{/profile/view}">
                            Add Employee
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/employees}">
                            Employee List
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/all-profiles-as-employees}">
                            Employee Profiles
                        </a>
                    </li>
                </ul>
            </div>
        </li>

        <!-- Salary Management -->
        <li>
            <button class="dropdown-trigger"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#salarySubmenu"
                    aria-expanded="false">
                <i class="fa-solid fa-wallet"></i>
                <span>Salary Management</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="collapse" id="salarySubmenu">
                <ul class="submenu">
                    <li>
                        <a th:href="@{/salary/slip/{id}(id=${loggedInEmpId})}">
                            View Salary
                        </a>
                    </li>
                </ul>
            </div>
        </li>

        <!-- Attendance -->
        <li>
            <button class="dropdown-trigger"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#attendanceSubmenu"
                    aria-expanded="false">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Attendance</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="collapse" id="attendanceSubmenu">
                <ul class="submenu">
                    <li>
                        <a th:href="@{/attendance}">
                            Logs Tracker
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/employee/attendance-tracking}">
                            Live Tracking Management
                        </a>
                    </li>
                </ul>
            </div>
        </li>

        <!-- Leave -->
        <li th:classappend="${currentPage == 'leave'} ? 'active'">
            <a th:href="@{/leave/apply}">
                <i class="fa-solid fa-envelope-open"></i>
                Leave
            </a>
        </li>

        <!-- Timesheet -->
        <li th:classappend="${currentPage == 'timesheet'} ? 'active'">
            <a th:href="@{/timesheet/log}">
                <i class="fa-solid fa-clock"></i>
                Timesheet
            </a>
        </li>

        <!-- Work From Home -->
        <li th:classappend="${currentPage == 'wfh'} ? 'active'">
            <a th:href="@{/employee/wfh/apply}">
                <i class="fa-solid fa-house-laptop"></i>
                Work From Home
            </a>
        </li>

    </ul>

</aside>

</body>
</html>
