<!-- src/main/resources/templates/fragments/sidebar.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar-component" class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
        <a th:href="@{/admin/dashboard}">
            <i class="fa-solid fa-square-poll-horizontal text-primary"></i>
            BlueThink Inc.
        </a>
    </div>

    <ul class="sidebar-menu">

        <!-- Dashboard -->
        <li th:classappend="${currentPage == 'dashboard'} ? 'active'">
            <a th:href="@{/admin/dashboard}">
                <i class="fa-solid fa-chart-simple"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <!-- Employee Management -->
        <li>
            <button class="dropdown-trigger"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#employeeSubmenu"
                    aria-expanded="false">

                <i class="fa-solid fa-users"></i>
                <span>Employee Management</span>
                <i class="fa-solid fa-chevron-right arrow-icon ms-auto"></i>
            </button>

            <div class="collapse" id="employeeSubmenu">
                <ul class="submenu">
                    <li>
                        <a th:href="@{/admin/employees}">
                            Add Employee
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/all/employees}">
                            Employee List
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/profile/view}">
                            Employee Profiles
                        </a>
                    </li>
                </ul>
            </div>
        </li>

        <!-- Salary Management -->
        <li>
            <button class="dropdown-trigger"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#salarySubmenu"
                    aria-expanded="false">

                <i class="fa-solid fa-wallet"></i>
                <span>Salary Management</span>
                <i class="fa-solid fa-chevron-right arrow-icon ms-auto"></i>
            </button>

            <div class="collapse" id="salarySubmenu">
                <ul class="submenu">
                    <li>
                        <a th:href="@{/salary/slip/{id}(id=${loggedInEmpId})}">
                            View Salary
                        </a>
                    </li>
                </ul>
            </div>
        </li>

        <!-- Attendance -->
        <li>
            <button class="dropdown-trigger"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#attendanceSubmenu"
                    aria-expanded="false">

                <i class="fa-solid fa-calendar-days"></i>
                <span>Attendance</span>
                <i class="fa-solid fa-chevron-right arrow-icon ms-auto"></i>
            </button>

            <div class="collapse" id="attendanceSubmenu">
                <ul class="submenu">
                    <li>
                        <a th:href="@{/attendance}">
                            Logs Tracker
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/employee/attendance-tracking}">
                            Live Tracking Management
                        </a>
                    </li>
                </ul>
            </div>
        </li>

        <!-- Leave -->
        <li th:classappend="${currentPage == 'leave'} ? 'active'">
            <a th:href="@{/leave/apply}">
                <i class="fa-solid fa-envelope-open"></i>
                <span>Leave</span>
            </a>
        </li>

        <!-- Timesheet -->
        <li th:classappend="${currentPage == 'timesheet'} ? 'active'">
            <a th:href="@{/timesheet/log}">
                <i class="fa-solid fa-clock"></i>
                <span>Timesheet</span>
            </a>
        </li>

        <!-- Work From Home -->
        <li th:classappend="${currentPage == 'wfh'} ? 'active'">
            <a th:href="@{/employee/wfh/apply}">
                <i class="fa-solid fa-house-laptop"></i>
                <span>Work From Home</span>
            </a>
        </li>

    </ul>

</aside>
