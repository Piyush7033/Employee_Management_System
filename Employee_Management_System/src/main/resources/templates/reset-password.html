<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
        }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #218838; }
        .error { color: #dc3545; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .info { color: #17a2b8; text-align: center; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>

    <div class="info">OTP aapki email par bhej diya gaya hai.</div>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/auth/reset-password}" method="post">

        <input type="hidden" name="email" th:value="${email}" />

        <div class="form-group">
            <label for="otp">Enter 6-Digit OTP</label>
            <input type="text" id="otp" name="otp" placeholder="123456" maxlength="6" required />
        </div>

        <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" placeholder="Minimum 6 characters" required />
        </div>

        <button type="submit">Update Password</button>
    </form>
</div>

</body>
</html>
