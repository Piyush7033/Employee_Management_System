<style>

        .top-navbar{
            height:70px;
            background:#ffffff;
            border-bottom:1px solid #e9ecef;
            padding:0 25px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            box-shadow:0 2px 10px rgba(0,0,0,.05);
        }

        .left-navbar{
            display:flex;
            align-items:center;
            gap:20px;
        }

        .menu-btn{
            width:42px;
            height:42px;
            border-radius:10px;
            border:none;
            background:#f5f7fb;
            transition:.3s;
        }

        .menu-btn:hover{
            background:#0d6efd;
            color:white;
        }

        .search-box{
            width:420px;
            position:relative;
        }

        .search-box input{
            border-radius:12px;
            padding-left:45px;
            height:45px;
            border:1px solid #dbe2ea;
            background:#f8f9fc;
        }

        .search-box i{
            position:absolute;
            left:18px;
            top:15px;
            color:#777;
        }

        .right-navbar{
            display:flex;
            align-items:center;
            gap:18px;
        }

        .icon-btn{

            width:42px;
            height:42px;
            border-radius:50%;
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            position:relative;
            transition:.3s;

        }

        .icon-btn:hover{

            background:#0d6efd;
            color:white;

        }

        .badge-count{

            position:absolute;
            top:-4px;
            right:-2px;
            background:red;
            color:white;
            font-size:10px;
            width:18px;
            height:18px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;

        }

        .profile{

            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;

        }

        .profile img{

            width:45px;
            height:45px;
            border-radius:50%;
            object-fit:cover;

        }

        .profile-name{

            font-weight:600;
            margin:0;

        }

        .profile-role{

            font-size:12px;
            color:gray;
            margin-top:-3px;

        }

        .dropdown-toggle::after{
            display:none;
        }

    </style>


<!-- ================= NAVBAR ================= -->

<nav class="top-navbar" th:fragment="navbar-component">

    <div class="left-navbar">

        <button class="menu-btn">
            <i class="fas fa-bars"></i>
        </button>

        <div class="search-box">

            <i class="fas fa-search"></i>

            <input
                    type="text"
                    class="form-control"
                    placeholder="Search employees, departments..."
            >

        </div>

    </div>



    <div class="right-navbar">

        <!-- Notification -->

        <div class="icon-btn">

            <i class="fa-regular fa-bell"></i>

            <span class="badge-count"
                  th:text="${notificationCount}">
                5
            </span>

        </div>


        <!-- Settings -->

        <div class="icon-btn">

            <i class="fa-solid fa-gear"></i>

        </div>



        <!-- Profile -->

        <div class="dropdown">

            <a class="dropdown-toggle text-decoration-none"
               href="#"
               data-bs-toggle="dropdown">

                <div class="profile">

                    <img src="/images/admin.png"
                         alt="Admin">

                    <div>

                        <p class="profile-name"
                           th:text="${loggedInEmpName}">
                            Admin
                        </p>

                        <small class="profile-role">

                            Super Admin

                        </small>

                    </div>

                    <i class="fa-solid fa-chevron-down"></i>

                </div>

            </a>

            <ul class="dropdown-menu dropdown-menu-end shadow">

                <li>
                    <a class="dropdown-item" href="/admin/profile">
                        <i class="fa-regular fa-user me-2"></i>
                        My Profile
                    </a>
                </li>

                <li>
                    <a class="dropdown-item" href="/admin/settings">
                        <i class="fa-solid fa-gear me-2"></i>
                        Settings
                    </a>
                </li>

                <li><hr class="dropdown-divider"></li>

                <li>

                    <a class="dropdown-item text-danger"
                       href="/logout">

                        <i class="fa-solid fa-right-from-bracket me-2"></i>

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>
