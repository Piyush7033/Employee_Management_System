<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #dbe9ff);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 18px;
            border: none;
        }

        .header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 18px;
            border-radius: 18px 18px 0 0;
        }

        .table thead {
            background: #212529;
            color: white;
        }

        .table tbody tr:hover {
            background: #f1f5ff;
            transition: 0.2s;
        }

        .btn {
            border-radius: 8px;
        }

        .search-box {
            border-radius: 10px;
        }

        .card-shadow {
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .badge-soft {
            padding: 6px 10px;
            border-radius: 10px;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="card card-shadow">

        <!-- HEADER -->
        <div class="header text-center">
            <h3><i class="fa-solid fa-users"></i> Employee Management System</h3>
        </div>

        <div class="card-body">

            <!-- SEARCH + ACTIONS -->
            <form class="row g-2 mb-3" method="get" th:action="@{/employees}">

                <div class="col-md-4">
                    <input type="text"
                           name="keyword"
                           class="form-control search-box"
                           placeholder="🔍 Search employee..."
                           th:value="${keyword}">
                </div>

                <div class="col-md-3">
                    <select name="sortBy" class="form-select">
                        <option value="id" th:selected="${sortBy == 'id'}">Sort by ID</option>
                        <option value="name" th:selected="${sortBy == 'name'}">Sort by Name</option>
                        <option value="email" th:selected="${sortBy == 'email'}">Sort by Email</option>
                        <option value="phone" th:selected="${sortBy == 'phone'}">Sort by Phone</option>
                    </select>
                </div>

                <input type="hidden" name="page" value="0">
                <input type="hidden" name="size" th:value="${size}">

                <div class="col-md-2">
                    <button class="btn btn-dark w-100">
                        Search
                    </button>
                </div>

                <div class="col-md-3 top-actions">
                    <a th:href="@{/employees/add}" class="btn btn-success w-100">
                        ➕ Add Employee
                    </a>
                </div>

            </form>

            <!-- TABLE -->
            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th>Joining Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="9" class="text-center text-danger fw-bold">
                            No Employees Found
                        </td>
                    </tr>

                    <tr th:each="emp : ${employees}">

                        <td th:text="${emp.id}"></td>

                        <!-- IMAGE -->
                        <td>
                            <img th:if="${emp.imageName != null}"
                                 th:src="@{'/uploads/' + ${emp.imageName}}"
                                 width="50" height="50"
                                 class="rounded-circle border">

                            <img th:unless="${emp.imageName != null}"
                                 src="https://via.placeholder.com/50"
                                 width="50" height="50"
                                 class="rounded-circle border">
                        </td>

                        <td th:text="${emp.name}"></td>
                        <td th:text="${emp.email}"></td>
                        <td th:text="${emp.phone}"></td>

                        <!-- Department -->
                        <td>
                            <span th:if="${emp.department != null}"
                                  class="badge bg-primary"
                                  th:text="${emp.department.departmentName}">
                            </span>

                            <span th:unless="${emp.department != null}"
                                  class="badge bg-secondary">
                                Not Assigned
                            </span>
                        </td>

                        <!-- Salary -->
                        <td>
                            <span th:if="${emp.salaryDetails != null}"
                                  class="badge bg-success"
                                  th:text="${emp.salaryDetails.basicSalary}">
                            </span>

                            <span th:unless="${emp.salaryDetails != null}"
                                  class="badge bg-warning text-dark">
                                N/A
                            </span>
                        </td>

                        <td th:text="${emp.joiningDate}"></td>

                        <!-- ACTIONS -->
                        <td>

                            <a th:href="@{/employees/edit/{id}(id=${emp.id})}"
                               class="btn btn-warning btn-sm">
                                ✏ Edit
                            </a>

                            <a th:href="@{/employees/delete/{id}(id=${emp.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this employee?')">
                                🗑 Delete
                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <!-- PAGINATION -->
            <div class="d-flex justify-content-center mt-4">

                <ul class="pagination">

                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/employees(page=${currentPage-1},size=${size},keyword=${keyword},sortBy=${sortBy})}">
                            Prev
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0,totalPages-1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i+1}"
                           th:href="@{/employees(page=${i},size=${size},keyword=${keyword},sortBy=${sortBy})}">
                        </a>

                    </li>

                    <li class="page-item"
                        th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/employees(page=${currentPage+1},size=${size},keyword=${keyword},sortBy=${sortBy})}">
                            Next
                        </a>
                    </li>

                </ul>

            </div>

            <!-- BACK BUTTON -->
            <div class="mt-3 text-start">
                <a th:href="@{/employee/dashboard}" class="btn btn-outline-secondary">
                    ⬅ Back to Dashboard
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
