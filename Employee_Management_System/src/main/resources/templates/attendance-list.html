<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Attendance List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            color: white;
        }

        .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: #212529;
            color: white;
        }

        .btn-custom {
            border-radius: 50px;
            font-weight: 600;
        }

        .badge {
            padding: 8px 12px;
            font-size: 12px;
        }

        .header-title {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

<div class="container mt-4">

    <div class="card-box">

        <!-- HEADER -->
        <div class="header-title">
            <h2><i class="fa-solid fa-calendar-check"></i> Attendance Records</h2>
        </div>

        <!-- TOP ACTIONS -->
        <div class="top-actions">

            <a th:href="@{/attendance/add}" class="btn btn-success btn-custom">
                <i class="fa fa-plus"></i> Mark Attendance
            </a>

            <a th:href="@{/dashboard}" class="btn btn-light btn-custom">
                <i class="fa fa-arrow-left"></i> Back
            </a>

        </div>

        <!-- TABLE -->
        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Employee</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(attendanceList)}">
                    <td colspan="5" class="text-center text-muted">
                        No Attendance Records Found
                    </td>
                </tr>

                <tr th:each="attendance : ${attendanceList}">

                    <td th:text="${attendance.id}"></td>

                    <td th:text="${attendance.employee != null ? attendance.employee.name : 'No Employee'}"></td>

                    <td th:text="${attendance.date}"></td>

                    <td>
                        <span class="badge bg-success"
                              th:if="${attendance.status == 'Present'}">Present</span>

                        <span class="badge bg-danger"
                              th:if="${attendance.status == 'Absent'}">Absent</span>

                        <span class="badge bg-warning text-dark"
                              th:if="${attendance.status == 'Leave'}">Leave</span>
                    </td>

                    <td>
                        <a th:href="@{/attendance/delete/{id}(id=${attendance.id})}"
                           class="btn btn-danger btn-sm btn-custom"
                           onclick="return confirm('Are you sure?')">
                            <i class="fa fa-trash"></i> Delete
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
